<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUXE — Product Catalog</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #0f0f0f;
        --white: #ffffff;
        --cream: #f8f5f0;
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gray-100: #f5f5f5;
        --gray-200: #e5e5e5;
        --gray-400: #9ca3af;
        --gray-600: #4b5563;
        --success: #16a34a;
        --font-display: "Cormorant Garamond", serif;
        --font-body: "DM Sans", sans-serif;
        --radius: 10px;
        --radius-sm: 6px;
        --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 28px rgba(0, 0, 0, 0.12);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-body);
        background: var(--cream);
        color: var(--black);
        min-height: 100vh;
      }

      /* HEADER */
      header {
        background: var(--black);
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
      }
      .logo {
        font-family: var(--font-display);
        font-size: 1.7rem;
        font-weight: 700;
        color: var(--gold);
        letter-spacing: 3px;
      }
      .logo small {
        display: block;
        font-family: var(--font-body);
        font-size: 0.6rem;
        letter-spacing: 5px;
        color: rgba(255, 255, 255, 0.35);
        font-weight: 400;
        margin-top: -2px;
      }
      .header-count {
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 1px;
      }
      .header-count span {
        color: var(--gold);
        font-weight: 600;
      }

      /* MAIN */
      .main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      /* TOOLBAR */
      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 28px;
      }
      .search-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--white);
        border: 1.5px solid var(--gray-200);
        border-radius: var(--radius);
        padding: 12px 18px;
        box-shadow: var(--shadow);
        transition: border-color 0.2s;
      }
      .search-wrap:focus-within {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
      }
      .search-wrap svg {
        flex-shrink: 0;
        color: var(--gray-400);
      }
      .search-wrap input {
        flex: 1;
        border: none;
        background: none;
        font-family: var(--font-body);
        font-size: 0.92rem;
        color: var(--black);
        outline: none;
      }
      .search-wrap input::placeholder {
        color: var(--gray-400);
      }
      .search-clear {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--gray-400);
        font-size: 1rem;
        padding: 2px;
        display: none;
      }
      .search-clear.visible {
        display: block;
      }
      .filter-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .filter-chip {
        background: var(--white);
        border: 1.5px solid var(--gray-200);
        border-radius: 30px;
        padding: 6px 18px;
        font-family: var(--font-body);
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--gray-600);
        cursor: pointer;
        transition: all 0.18s;
      }
      .filter-chip:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .filter-chip.active {
        background: var(--black);
        border-color: var(--black);
        color: var(--white);
      }

      /* GRID */
      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }

      /* CARD */
      .product-card {
        background: var(--white);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        animation: fadeUp 0.35s ease both;
        cursor: pointer;
      }
      .product-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-md);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card-img-wrap {
        overflow: hidden;
      }
      .card-img {
        width: 100%;
        height: 210px;
        object-fit: cover;
        display: block;
        background: var(--gray-100);
        transition: transform 0.3s;
      }
      .product-card:hover .card-img {
        transform: scale(1.04);
      }
      .card-img-placeholder {
        width: 100%;
        height: 210px;
        background: var(--gray-100);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: var(--gray-400);
      }
      .card-body {
        padding: 14px;
      }
      .card-category {
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 4px;
      }
      .card-name {
        font-family: var(--font-display);
        font-size: 1.05rem;
        font-weight: 600;
        line-height: 1.3;
        color: var(--black);
        margin-bottom: 4px;
      }
      .card-id {
        font-family: "Courier New", monospace;
        font-size: 0.72rem;
        color: var(--gray-400);
        margin-bottom: 10px;
      }
      .card-sizes {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 12px;
      }
      .size-pill {
        background: var(--cream);
        border: 1px solid var(--gray-200);
        border-radius: 4px;
        font-size: 0.68rem;
        font-weight: 600;
        padding: 2px 8px;
        color: var(--gray-600);
      }
      .copy-btn {
        width: 100%;
        background: var(--cream);
        border: 1.5px solid var(--gray-200);
        border-radius: var(--radius-sm);
        padding: 9px;
        font-family: var(--font-body);
        font-size: 0.76rem;
        font-weight: 600;
        color: var(--black);
        cursor: pointer;
        transition: all 0.18s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .copy-btn:hover {
        background: var(--black);
        color: var(--white);
        border-color: var(--black);
      }
      .copy-btn.copied {
        background: var(--success);
        color: white;
        border-color: var(--success);
      }

      /* VIEWER */
      .viewer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      .viewer-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .viewer-close {
        position: fixed;
        top: 16px;
        right: 20px;
        background: rgba(255, 255, 255, 0.12);
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.18s;
        z-index: 201;
      }
      .viewer-close:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      .viewer-box {
        background: var(--white);
        border-radius: var(--radius);
        overflow: hidden;
        display: flex;
        max-width: 860px;
        width: 100%;
        max-height: 88vh;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        transform: scale(0.94) translateY(12px);
        transition: transform 0.25s;
      }
      .viewer-overlay.open .viewer-box {
        transform: scale(1) translateY(0);
      }
      .viewer-img {
        width: 55%;
        object-fit: contain;
        display: block;
        background: var(--gray-100);
        flex-shrink: 0;
      }
      .viewer-info {
        padding: 32px 28px;
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow-y: auto;
      }
      .viewer-category {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
      }
      .viewer-name {
        font-family: var(--font-display);
        font-size: 1.8rem;
        font-weight: 700;
        line-height: 1.2;
        color: var(--black);
        margin-bottom: 10px;
      }
      .viewer-id {
        font-family: "Courier New", monospace;
        font-size: 0.8rem;
        color: var(--gray-400);
        background: var(--gray-100);
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        margin-bottom: 24px;
      }
      .viewer-sizes-label {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--gray-600);
        margin-bottom: 8px;
      }
      .viewer-sizes {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 32px;
      }
      .viewer-size-pill {
        background: var(--cream);
        border: 1.5px solid var(--gray-200);
        border-radius: var(--radius-sm);
        font-size: 0.82rem;
        font-weight: 600;
        padding: 5px 13px;
        color: var(--black);
      }
      .viewer-copy-btn {
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: var(--radius-sm);
        padding: 14px 20px;
        font-family: var(--font-body);
        font-size: 0.84rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.18s;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: auto;
      }
      .viewer-copy-btn:hover {
        background: var(--gold);
        color: var(--black);
      }
      .viewer-copy-btn.copied {
        background: var(--success);
        color: white;
      }

      /* SKELETON */
      .skeleton-card {
        background: var(--white);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--gray-100) 25%,
          var(--gray-200) 50%,
          var(--gray-100) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* EMPTY */
      .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 80px 20px;
        color: var(--gray-400);
      }
      .empty-state .icon {
        font-size: 3rem;
        margin-bottom: 14px;
      }
      .empty-state h3 {
        font-family: var(--font-display);
        font-size: 1.4rem;
        color: var(--black);
        margin-bottom: 8px;
      }
      .empty-state p {
        font-size: 0.85rem;
      }

      /* TOAST */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: var(--black);
        color: var(--white);
        padding: 11px 18px;
        border-radius: var(--radius-sm);
        font-size: 0.82rem;
        box-shadow: var(--shadow-md);
        border-left: 3px solid var(--gold);
        display: flex;
        align-items: center;
        gap: 8px;
        opacity: 0;
        transform: translateX(20px);
        transition: all 0.3s;
        max-width: 300px;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(0);
      }
      .toast.success {
        border-left-color: var(--success);
      }

      /* RESPONSIVE */
      @media (max-width: 700px) {
        header {
          padding: 0 16px;
        }
        .main {
          padding: 20px 14px;
        }
        .products-grid {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 14px;
        }
        .card-img,
        .card-img-placeholder {
          height: 170px;
        }
        .viewer-box {
          flex-direction: column;
          max-height: 95vh;
        }
        .viewer-img {
          width: 100%;
          height: 250px;
        }
        .viewer-info {
          padding: 20px;
        }
        .viewer-name {
          font-size: 1.3rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">LUXE <small>Product Catalog</small></div>
      <div class="header-count" id="headerCount"></div>
    </header>

    <div class="main">
      <div class="toolbar">
        <div class="search-wrap">
          <svg
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by product name or ID..."
            oninput="onSearch(this.value)"
          />
          <button class="search-clear" id="searchClear" onclick="clearSearch()">
            x
          </button>
        </div>
        <div class="filter-bar" id="filterBar">
          <button class="filter-chip active" onclick="setFilter('All', this)">
            All
          </button>
          <button class="filter-chip" onclick="setFilter('Panjabi', this)">
            Panjabi
          </button>
          <button class="filter-chip" onclick="setFilter('Shirt', this)">
            Shirt
          </button>
          <button class="filter-chip" onclick="setFilter('T-shirt', this)">
            T-shirt
          </button>
          <button class="filter-chip" onclick="setFilter('Pant', this)">
            Pant
          </button>
          <button class="filter-chip" onclick="setFilter('Polo Shirt', this)">
            Polo Shirt
          </button>
        </div>
      </div>

      <div class="products-grid" id="productsGrid">
        <div class="skeleton-card">
          <div class="skeleton" style="height: 210px"></div>
          <div
            style="
              padding: 14px;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          >
            <div
              class="skeleton"
              style="height: 10px; width: 50%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 16px; width: 80%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 34px; border-radius: 6px; margin-top: 4px"
            ></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton" style="height: 210px"></div>
          <div
            style="
              padding: 14px;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          >
            <div
              class="skeleton"
              style="height: 10px; width: 50%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 16px; width: 80%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 34px; border-radius: 6px; margin-top: 4px"
            ></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton" style="height: 210px"></div>
          <div
            style="
              padding: 14px;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          >
            <div
              class="skeleton"
              style="height: 10px; width: 50%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 16px; width: 80%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 34px; border-radius: 6px; margin-top: 4px"
            ></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton" style="height: 210px"></div>
          <div
            style="
              padding: 14px;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          >
            <div
              class="skeleton"
              style="height: 10px; width: 50%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 16px; width: 80%; border-radius: 4px"
            ></div>
            <div
              class="skeleton"
              style="height: 34px; border-radius: 6px; margin-top: 4px"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <!-- IMAGE VIEWER -->
    <div
      class="viewer-overlay"
      id="viewerOverlay"
      onclick="overlayClick(event)"
    >
      <button class="viewer-close" onclick="closeViewer()">x</button>
      <div class="viewer-box">
        <img class="viewer-img" id="viewerImg" src="" alt="" />
        <div class="viewer-info">
          <div class="viewer-category" id="viewerCategory"></div>
          <div class="viewer-name" id="viewerName"></div>
          <div class="viewer-id" id="viewerId"></div>
          <div class="viewer-sizes-label">Available Sizes</div>
          <div class="viewer-sizes" id="viewerSizes"></div>
          <button class="viewer-copy-btn" id="viewerCopyBtn">
            Copy Product Info
          </button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const cfg = {
        apiKey: "AIzaSyD2xtZZ9viQOxjmnYpzQhtjYne5l82FM3Y",
        authDomain: "bluedreamitaly.firebaseapp.com",
        projectId: "bluedreamitaly",
        storageBucket: "bluedreamitaly.firebasestorage.app",
        messagingSenderId: "145879085917",
        appId: "1:145879085917:web:938008da8d22839f7c6eb4",
      };

      const db = getFirestore(initializeApp(cfg));

      let all = [];
      let activeFilter = "All";
      let searchQ = "";
      let selectedProduct = null;

      async function load() {
        try {
          const snap = await getDocs(
            query(
              collection(db, "catalogProducts"),
              orderBy("createdAt", "desc"),
            ),
          );

          all = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          render();
        } catch (e) {
          document.getElementById("productsGrid").innerHTML =
            '<div class="empty-state"><div class="icon">⚠</div><h3>Could not load</h3><p>' +
            e.message +
            "</p></div>";
        }
      }

      function render() {
        const filtered = all.filter((p) => {
          const q = searchQ.toLowerCase();
          const matchSearch =
            !q ||
            (p.productName || "").toLowerCase().includes(q) ||
            (p.productId || "").toLowerCase().includes(q);

          const matchFilter =
            activeFilter === "All" || p.category === activeFilter;

          return matchSearch && matchFilter;
        });

        const hc = document.getElementById("headerCount");
        hc.innerHTML =
          "<span>" +
          filtered.length +
          "</span> product" +
          (filtered.length !== 1 ? "s" : "");

        const grid = document.getElementById("productsGrid");

        if (!filtered.length) {
          grid.innerHTML =
            '<div class="empty-state"><div class="icon">🔍</div><h3>No products found</h3><p>Try another search.</p></div>';
          return;
        }

        grid.innerHTML = filtered
          .map((p, i) => {
            const index = all.indexOf(p);

            return `
      <div class="product-card" style="animation-delay:${i * 0.04}s" onclick="openViewer(${index})">
        
        <div class="card-img-wrap">
          ${
            p.imageURL
              ? `<img class="card-img" src="${p.imageURL}" loading="lazy">`
              : `<div class="card-img-placeholder">📦</div>`
          }
        </div>

        <div class="card-body">
          <div class="card-category">${p.category || ""}</div>
          <div class="card-name">${p.productName || "No name"}</div>
          <div class="card-id">#${p.productId || ""}</div>

          <div class="card-sizes">
            ${(p.sizes || [])
              .map((s) => `<span class="size-pill">${s}</span>`)
              .join("")}
          </div>

          <button class="copy-btn" onclick="event.stopPropagation();doCopy(${index}, this)">
            Copy Product Info
          </button>
        </div>
      </div>`;
          })
          .join("");
      }

      window.openViewer = function (index) {
        const p = all[index];
        selectedProduct = p;

        document.getElementById("viewerImg").src = p.imageURL || "";
        document.getElementById("viewerCategory").textContent =
          p.category || "";
        document.getElementById("viewerName").textContent = p.productName || "";
        document.getElementById("viewerId").textContent =
          "#" + (p.productId || "");

        document.getElementById("viewerSizes").innerHTML = (p.sizes || [])
          .map((s) => `<span class="viewer-size-pill">${s}</span>`)
          .join("");

        const btn = document.getElementById("viewerCopyBtn");
        btn.classList.remove("copied");
        btn.textContent = "Copy Product Info";

        btn.onclick = function () {
          doCopy(index, btn);
        };

        document.getElementById("viewerOverlay").classList.add("open");
        document.body.style.overflow = "hidden";
      };

      window.closeViewer = function () {
        document.getElementById("viewerOverlay").classList.remove("open");
        document.body.style.overflow = "";
      };

      window.overlayClick = function (e) {
        if (e.target.id === "viewerOverlay") closeViewer();
      };

      window.doCopy = function (index, btn) {
        const p = all[index];

        const txt =
          "Product: " +
          p.productName +
          "\nID: " +
          p.productId +
          "\nCategory: " +
          p.category +
          "\nSizes: " +
          (p.sizes || []).join(", ");

        navigator.clipboard.writeText(txt).then(() => {
          btn.textContent = "Copied!";
          btn.classList.add("copied");

          setTimeout(() => {
            btn.textContent = "Copy Product Info";
            btn.classList.remove("copied");
          }, 2000);
        });
      };

      window.onSearch = function (v) {
        searchQ = v;
        document
          .getElementById("searchClear")
          .classList.toggle("visible", v.length > 0);
        render();
      };

      window.clearSearch = function () {
        document.getElementById("searchInput").value = "";
        searchQ = "";
        document.getElementById("searchClear").classList.remove("visible");
        render();
      };

      window.setFilter = function (cat, btn) {
        activeFilter = cat;

        document
          .querySelectorAll(".filter-chip")
          .forEach((b) => b.classList.remove("active"));

        btn.classList.add("active");
        render();
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeViewer();
      });

      load();
    </script>
  </body>
</html>
